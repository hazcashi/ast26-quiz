author: hazcashi
date: 2026-04-02
question: |
  相比 SLC ssd，QLC SSD 更適合以下哪種情境，為什麼?

options:
  - text: "少量寫入、大量讀取的冷資料歸檔。因為 QLC 的儲存密度高、單位成本低，加上歸檔資料不常變動，完美避開了 QLC 耐久度較差的致命傷。"
    correct: true
    explanation: |
      冷儲存或資料歸檔的特性是「寫入一次、長期讀取」，這讓 QLC 寫入壽命較短的劣勢變得無關痛癢。同時，它大容量、低成本的優勢被最大化。
  - text: "高頻寫入的資料庫日誌系統。因為 QLC 寫入性能極佳，足以應付龐大的寫入量。"
    explanation: |
      需要「瘋狂寫入」的情境比較適合 SLC。首先，QLC 每個單元要塞進 4 個位元，寫入速度其實很慢，根本稱不上「性能極佳」。再者，如果硬把它放在高頻寫入的環境，QLC 僅有 500 到 1000 次的 P/E 循環大概幾個月就會被榨乾，導致 SSD 提早報銷。
  - text: "少量寫入、大量讀取的影音串流服務。因為這類服務對讀取效能的要求不高，用 QLC 成本較划算。"
    explanation: |
      原因大錯特錯。影音串流其實非常看重穩定的資料吞吐量跟低延遲（QoS）來確保觀看體驗。QLC 因為電壓狀態多、雜訊干擾大，讀取延遲相對較高，用在這裡可能會影響用戶體驗。

  - text: "頻繁進行隨機寫入的虛擬機快照系統。因為 QLC 容量夠大，能輕易吞下大量的快照資料。"
    explanation: |
      虛擬機快照會產生大量瑣碎的「隨機小檔寫入」，這會引發嚴重的寫入放大（Write Amplification）效應，導致 QLC 的壽命瞬間見底。